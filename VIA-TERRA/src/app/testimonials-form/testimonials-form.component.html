<app-navbar></app-navbar>

<div class="ftco-blocks-cover-1">
  <div class="site-section-cover overlay" style="background-image: url('../assets/HomeDesign/images/hero_1.jpg')">
    <div class="container">
      <div class="row align-items-center justify-content-center text-center">
        <div class="col-md-5" data-aos="fade-up">
          <h1 class="mb-3 text-white">Share Your Experience</h1>
          <p>Your feedback means the world to us! Share your story and let others know how we’ve made a difference in your journey. We value every word and appreciate your time in helping us improve.</p>            
        </div>
      </div>
    </div>
  </div>
</div>

<div class="site-section">
  <div class="container">
    <div class="row justify-content-center text-center mb-5">
      <div class="col-md-10">
        <div class="heading-39101 mb-5">
          <span class="backdrop text-center">Testimonials</span>
          <span class="subtitle-39191">Share Your Story</span>
          <h3>Submit Your Testimonial</h3>
        </div>
      </div>
    </div>
   
    <div class="row">
      <div class="col-lg-8 mb-5 mx-auto">
        <form (ngSubmit)="submitTestimonial()">
          <div class="form-group row">
            <div class="col-md-12">
              <input type="text" id="name" class="form-control form-control-lg" placeholder="Your Name" [(ngModel)]="testimonial.name" name="name" required>
            </div>
          </div>

          <div class="form-group row">
            <div class="col-md-12">
              <textarea id="message" class="form-control form-control-lg" placeholder="Write your testimonial" [(ngModel)]="testimonial.message" name="message" required></textarea>
            </div>
          </div>

          <div class="form-group row">
            <div class="col-md-6 mr-auto">
              <input type="submit" class="btn btn-block btn-primary text-white py-3 px-5" value="Submit Testimonial">
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
